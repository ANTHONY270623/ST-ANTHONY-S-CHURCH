<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Member Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
    function generateUniqueId() {
        // Simple unique ID: 'M' + timestamp + random 3 digits
        return 'M' + Date.now() + Math.floor(Math.random()*900+100);
    }
    window.onload = function() {
        document.getElementById('uniqueId').value = generateUniqueId();
    };
    </script>
</head>
<body>
    <!-- Floating Stars Background -->
    <div class="stars" id="stars"></div>
    
    <!-- Dark Mode Toggle -->
    <button class="dark-mode-toggle" id="darkModeToggle" title="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
    </button>
    <div class="section">
        <h2>New Member Registration</h2>
        
        <form class="login-card">
            <div class="form-group">
                <label>Membership ID</label>
                <input type="text" id="uniqueId" name="uniqueId" readonly title="Auto-generated membership ID">
            </div>
            <div class="form-group">
                <input type="text" name="areaName" placeholder="Area Name" required>
            </div>
            <div class="form-group">
                <input type="text" name="familyHead" placeholder="Family Head Name" required>
            </div>
            <div class="form-group">
                <input type="number" name="familyCount" placeholder="Family Members Count" min="1" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="New Password" required>
            </div>
            <div class="form-group">
                <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
            </div>
            <div class="form-group form-inline">
                <input type="checkbox" id="terms" required class="checkbox-inline">
                <label for="terms" class="label-inline">I agree to the terms and conditions</label>
            </div>
            <button type="submit" class="btn-primary btn-block">Submit</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
