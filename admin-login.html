<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b0000">
    <title>Admin Login - St. Anthony's Church Green Park</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="threads-fix.css">
    <link rel="stylesheet" href="responsive.css">
    <style>
        .login-container { 
            max-width: 450px; 
            margin: 3rem auto; 
            padding: 2.5rem; 
            background-color: var(--card-bg); 
            border-radius: 12px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.15); 
            border: 1px solid var(--border-color);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header { 
            text-align: center; 
            margin-bottom: 2rem; 
        }
        
        .login-header i { 
            font-size: 3.5rem; 
            color: var(--primary-color); 
            margin-bottom: 1rem; 
            display: block;
        }
        
        .login-header h2 {
            color: var(--primary-color);
            margin: 0.5rem 0;
            font-size: 1.8rem;
        }
        
        .login-header p {
            color: var(--text-secondary, #666);
            margin: 0;
        }
        
        .form-group { 
            margin-bottom: 1.5rem; 
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-color);
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.1);
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1.5rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .remember-me input[type="checkbox"] {
            width: auto;
            margin: 0;
        }
        
        .forgot-password a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .forgot-password a:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }
        
        .form-actions { 
            margin-top: 2rem; 
            display: flex; 
            flex-direction: column; 
            gap: 1rem; 
        }
        
        .btn-primary {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: #fff;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.3);
        }
        
        .back-link {
            color: #000 !important;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--secondary-color) !important;
        }
        
        .error { 
            background: #ffebee; 
            color: #c62828; 
            padding: .75rem 1rem; 
            border-radius: 8px; 
            margin-bottom: 1rem; 
            border-left: 4px solid #c62828;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
        
        .success {
            background: #e8f5e8;
            color: #2e7d32;
            padding: .75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #4caf50;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-nav { 
            margin: 1rem; 
        }
        
        /* Dark mode adjustments */
        .dark-mode .form-group input {
            background-color: var(--card-bg);
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        .dark-mode .error {
            background: rgba(255, 82, 82, 0.1);
            color: #ff5252;
            border-left-color: #ff5252;
        }
        
        .dark-mode .success {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            border-left-color: #4caf50;
        }
        
        /* Dark mode button positioning for this page */
        .dark-mode-toggle{position:fixed;right:16px;bottom:16px;z-index:1000}
    </style>
</head>
<body>
    <!-- Floating Stars Background -->
    <div class="stars" id="stars"></div>
    
    <!-- Dark Mode Toggle -->
    <button class="dark-mode-toggle" id="darkModeToggle" title="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
    </button>
    
    <!-- Back Navigation -->
    <div class="back-nav">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>

    <!-- Main Login Section -->
    <section class="section">
        <div class="login-container">
            <div class="login-header">
                <i class="fas fa-user-shield"></i>
                <h2>Admin Login</h2>
                <p>Please enter your credentials to access the admin area</p>
            </div>
            
            <!-- Error/Success Messages -->
            <div id="errorMessage" class="error">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="errorText"></span>
            </div>
            
            <div id="successMessage" class="success">
                <i class="fas fa-check-circle"></i>
                <span id="successText"></span>
            </div>
            
            <!-- Login Form -->
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminEmail">
                        <i class="fas fa-envelope"></i> Admin Email
                    </label>
                    <input type="email" id="adminEmail" name="email" placeholder="Enter your admin email" required>
                </div>
                
                <div class="form-group">
                    <label for="adminPassword">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="adminPassword" name="password" placeholder="Enter your password" required>
                </div>
                
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe" name="remember_me">
                        <label for="rememberMe">Remember Me</label>
                    </div>
                    <div class="forgot-password">
                        <a href="forgot-password.html" id="forgotPasswordLink">
                            <i class="fas fa-key"></i> Forgot Password?
                        </a>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Login to Admin Panel
                    </button>
                </div>
            </form>
        </div>
    </section>

    <!-- JavaScript for Form Handling -->
    <script src="script.js"></script>
    <script>
        // Admin credentials (in a real application, this would be handled server-side)
        const ADMIN_CREDENTIALS = {
            email: 'greenparkchurch25@gmail.com',
            password: '7025727541'
        };

        // Handle form submission
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Hide previous messages
            hideMessages();
            
            // Validate inputs
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            // Check credentials
            console.log('Entered email:', email);
            console.log('Expected email:', ADMIN_CREDENTIALS.email);
            console.log('Entered password:', password);
            console.log('Expected password:', ADMIN_CREDENTIALS.password);
            
            if (email.toLowerCase() === ADMIN_CREDENTIALS.email.toLowerCase() && password === ADMIN_CREDENTIALS.password) {
                // Set session storage
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminEmail', email);
                
                // Handle remember me
                if (rememberMe) {
                    localStorage.setItem('adminRememberEmail', email);
                } else {
                    localStorage.removeItem('adminRememberEmail');
                }
                
                showSuccess('Login successful! Redirecting to admin dashboard...');
                
                // Redirect to admin dashboard after a short delay
                setTimeout(() => {
                    window.location.href = 'admin-panel.html';
                }, 1500);
                
            } else {
                showError('Invalid email or password. Please try again.');
            }
        });
        
        // Load remembered email if exists
        document.addEventListener('DOMContentLoaded', function() {
            const rememberedEmail = localStorage.getItem('adminRememberEmail');
            if (rememberedEmail) {
                document.getElementById('adminEmail').value = rememberedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });
        
        // Utility functions
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.style.display = 'flex';
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            successText.textContent = message;
            successDiv.style.display = 'flex';
        }
        
        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
    </script>
</body>
</html>
